services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  ftp:
    image: fauria/vsftpd
    environment:
      FTP_USER: testftp
      FTP_PASSWORD: testftppass
    ports:
      - "21:21"
    volumes:
      - ftp-data:/home/vsftpd

  chest-backup:
    build: .
    volumes:
      - ./chest-backup.e2e.json:/app/chest-backup.json:ro
      - test-data:/data:ro
      - backup-data:/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOG_LEVEL=debug
      - FTP_PASSWORD=testftppass
      - DB_PASSWORD=testpass
    depends_on:
      postgres:
        condition: service_healthy
      ftp:
        condition: service_started

volumes:
  ftp-data:
  test-data:
  backup-data:
