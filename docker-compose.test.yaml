services:
  postgres:
    container_name: chest-backup-e2e-pg
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 1s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  sftp:
    container_name: chest-backup-e2e-sftp
    image: atmoz/sftp:latest
    environment:
      SFTP_USERS: testftp:testftppass:::upload
    ports:
      - "2121:22"
    restart: unless-stopped

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      postgres:
        condition: service_healthy
      sftp:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.ssh:/root/.ssh:ro
    environment:
      - E2E_SFTP_HOST=sftp
      - E2E_SFTP_PORT=22
      - E2E_SFTP_USER=testftp
      - E2E_SFTP_PASSWORD=testftppass
      - E2E_PG_HOST=chest-backup-e2e-pg
      - E2E_PG_PORT=5432
      - E2E_PG_CONTAINER=chest-backup-e2e-pg
      - E2E_DISCORD_WEBHOOK_URL=${E2E_DISCORD_WEBHOOK_URL}
      - E2E_REAL_SFTP_HOST=${E2E_REAL_SFTP_HOST}
      - E2E_REAL_SFTP_PORT=${E2E_REAL_SFTP_PORT}
      - E2E_REAL_SFTP_USER=${E2E_REAL_SFTP_USER}
      - E2E_REAL_SFTP_PASSWORD=${E2E_REAL_SFTP_PASSWORD}
      - E2E_REAL_SFTP_PATH=${E2E_REAL_SFTP_PATH}
      - E2E_REAL_SFTP_PRIVATE_KEY=${E2E_REAL_SFTP_PRIVATE_KEY}
    # no restart policy — one-shot container
